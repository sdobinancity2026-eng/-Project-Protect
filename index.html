<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Protect</title>

    <link rel="manifest" href="manifest.json">

    <link rel="icon" href="Lsb.jpg" type="image/jpg">
    <link rel="apple-touch-icon" href="Lsb.jpg">

    <style>
      body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
        background: #003366; 
      }
      
      #splash-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #003366; 
        color: white;
        display: flex; flex-direction: column; 
        align-items: center; justify-content: center;
        z-index: 9999;
        cursor: pointer;
        transition: opacity 0.5s ease;
        font-family: sans-serif;
      }

      iframe { 
        width: 100%; height: 100%; border: none; 
      }
    </style>
  </head>
  <body>

    <div id="splash-screen" onclick="launchApp()">
      <div style="text-align: center;">
        <h1>SDO Biñan City</h1>
        <p>Project Protect</p>
        <br>
        <p style="font-weight: bold; border: 1px solid white; padding: 10px;">
          CLICK TO ENTER
        </p>
      </div>
    </div>

    <iframe 
      id="appFrame"
      src="https://script.google.com/macros/s/AKfycbwxhcX3i4Iem2rOW3Hbdi1rfRp6246FNbwruYpm8UTucwJ5892CIn6MKhyZ8DU-iEe2/exec"
      allow="geolocation; camera; microphone" 
      allowfullscreen="true">
    </iframe>

    <script>
      function launchApp() {
        const splash = document.getElementById("splash-screen");
        
        // Hide Splash
        splash.style.opacity = '0';
        setTimeout(() => { splash.style.display = 'none'; }, 500);
        
        // Request Fullscreen
        document.documentElement.requestFullscreen().catch((err) => {
          console.warn(`Fullscreen skipped: ${err.message}`);
        });
      }
    </script>
  </body>
</html>
