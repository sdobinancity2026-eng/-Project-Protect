<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDO Biñan City Project Protect</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="safe.png" type="image/png">
    <link rel="apple-touch-icon" href="safe.png">

    <style>
      body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
        background: url('pro.png') no-repeat center center fixed;
        background-size: cover;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      
      .overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(rgba(0, 51, 102, 0.75), rgba(0, 51, 102, 0.75)), url('pro.png');
        background-size: cover;
        background-position: center;
        color: white;
        display: flex; flex-direction: column; 
        align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }

      .header-content {
        text-align: center;
      }

      /* SDO Biñan City - Smaller */
      .header-content h1 {
        font-size: 1.5rem;
        margin-bottom: 0;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        font-weight: 400;
        opacity: 0.9;
      }

      /* PROJECT PROTECT - Much Bigger */
      .header-content p {
        font-size: 3.5rem; /* Increased size significantly */
        letter-spacing: 4px;
        text-transform: uppercase;
        color: #ffcc00; /* SDO Gold Accent */
        font-weight: 900;
        margin-top: -5px; /* Pulls it closer to the line above */
        margin-bottom: 40px;
        text-shadow: 3px 3px 6px rgba(0,0,0,0.6);
      }

      .btn-container { display: flex; gap: 20px; justify-content: center; }
      
      button {
        padding: 15px 35px; font-size: 18px; cursor: pointer;
        border: 2px solid #ffcc00; background: rgba(255, 255, 255, 0.1); color: white;
        border-radius: 50px; font-weight: bold;
        transition: all 0.3s ease;
        backdrop-filter: blur(5px);
      }
      
      button:hover { 
        background: #ffcc00; 
        color: #003366; 
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(255, 204, 0, 0.4);
      }

      .loader { display: none; }
      .spinner {
        border: 8px solid rgba(255, 255, 255, 0.3);
        border-top: 8px solid #ffcc00;
        border-radius: 50%;
        width: 60px;
        height: 60px;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      iframe { width: 100%; height: 100%; border: none; display: none; background: white; }
    </style>
  </head>
  <body>

    <div id="splash-screen" class="overlay">
      <div class="header-content">
        <h1>SDO Biñan City</h1>
        <p>Project Protect</p>
        <div class="btn-container">
          <button onclick="launchApp('kiosk')">Student Portal</button>
          <button onclick="launchApp('admin')">Admin Dashboard</button>
        </div>
      </div>
    </div>

    <div id="loader" class="loader overlay">
      <div class="spinner"></div>
      <h2 style="color: #ffcc00; letter-spacing: 3px;">INITIALIZING...</h2>
    </div>

    <iframe id="appFrame" title="Project Protect System"></iframe>

    <script>
      function launchApp(mode) {
        const baseUrl = "https://script.google.com/macros/s/AKfycbztHoEkeEflDEyTuCYqwq1VvknJEWO_t1-Y4KUIwMYCl2t47AcjxTksXrH4_ACjDCVAqQ/exec";
        const frame = document.getElementById("appFrame");
        const splash = document.getElementById("splash-screen");
        const loader = document.getElementById("loader");
        
        frame.src = (mode === 'admin') ? baseUrl + "?page=admin" : baseUrl;
        
        splash.style.opacity = '0';
        setTimeout(() => { 
            splash.style.display = 'none'; 
            loader.style.display = 'flex'; 
        }, 500);
        
        frame.onload = function() {
            loader.style.display = 'none';
            frame.style.display = 'block'; 
        };
        
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
          elem.requestFullscreen().catch((err) => console.warn(err.message));
        }
      }
    </script>
  </body>
</html>
