<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDO Biñan City | Project Protect Launcher</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="safety.png" type="image/png">
    <link rel="apple-touch-icon" href="safety.png">

    <style>
      body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
        background: #003366; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      
      .bg-container {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: url('bg.jpeg') no-repeat center center fixed; 
        background-size: cover;
        z-index: 1;
      }

      .overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 51, 102, 0.8); 
        color: white;
        display: flex; flex-direction: column; 
        align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
        text-align: center;
      }

      h1 { font-size: 3rem; margin-bottom: 0; text-transform: uppercase; letter-spacing: 2px; }
      p { font-size: 1.5rem; color: #ffcc00; margin-top: 5px; font-weight: bold; }

      .btn-container { margin-top: 40px; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
      
      button {
        padding: 18px 40px; font-size: 1.1rem; cursor: pointer;
        border: 2px solid #ffcc00; background: transparent; color: #ffcc00;
        border-radius: 50px; font-weight: bold;
        transition: all 0.3s ease;
        text-transform: uppercase;
      }

      button:hover { 
        background: #ffcc00; color: #003366; 
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      }

      .loader { display: none; }
      .spinner {
        border: 6px solid rgba(255, 255, 255, 0.3);
        border-top: 6px solid #ffcc00;
        border-radius: 50%;
        width: 60px; height: 60px;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>

    <div class="bg-container"></div>

    <div id="splash-screen" class="overlay">
      <div style="padding: 20px;">
        <img src="time.png" alt="Logo" style="width: 120px; margin-bottom: 20px;"> 
        <h1>SDO Biñan City</h1>
        <p>🛡️ PROJECT PROTECT</p>
        <div class="btn-container">
          <button onclick="launchApp('kiosk')">Student Helper</button>
          <button onclick="launchApp('admin')">Admin Dashboard</button>
        </div>
      </div>
    </div>

    <div id="loader" class="loader overlay">
      <div class="spinner"></div>
      <h2 style="color: #ffcc00;">Accessing Secure Server...</h2>
    </div>

    <script>
     <script>
  function launchApp(mode) {
    // Project Protect Web App URL
    const baseUrl = "https://script.google.com/macros/s/AKfycbzOlyFVWdj8AZzIrrzjTCvQM5uSa3PeOdu2U0dIGVFDBUygZKqsclQCEQOdx7dbDV8hUw/exec";
    const frame = document.getElementById("appFrame");
    const splash = document.getElementById("splash-screen");
    const loader = document.getElementById("loader");
    
    // 1. Trigger Fullscreen on the GitHub page itself
    const elem = document.documentElement;
    if (elem.requestFullscreen) {
      elem.requestFullscreen().catch((err) => console.warn("Fullscreen blocked"));
    }
    
    // 2. Load the App inside the frame
    frame.src = (mode === 'admin') ? baseUrl + "?page=admin" : baseUrl;
    
    // 3. UI Transitions
    splash.style.opacity = '0';
    setTimeout(() => { 
        splash.style.display = 'none'; 
        loader.style.display = 'flex'; 
    }, 500);
    
    frame.onload = function() {
        loader.style.display = 'none';
        frame.style.display = 'block'; 
    };
  }
</script>
    </script>
  </body>
</html>
